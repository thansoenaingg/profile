<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 520px;
      width: 100%;
    }

    /* TOP */
    .top {
      background: #111827;
      color: white;
      text-align: center;
      padding: 50px 20px 30px;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #38bdf8;
      box-shadow: 0 0 15px #38bdf8;
    }

    h1 {
      margin: 10px 0 5px;
      color: #38bdf8;
    }

    .role {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* SOCIAL */
    .social a {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 180px;
      background: transparent;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .social a:hover {
      background: #38bdf8;
      color: black;
      box-shadow: 0 0 15px #38bdf8;
    }

    /* BOTTOM */
    .bottom {
      background: white;
      padding: 25px;
      color: #333;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #0ea5e9;
      border-left: 4px solid #0ea5e9;
      padding-left: 8px;
      margin-top: 20px;
    }

    .bio {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    /* BOOK */
    .book {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .book h3 {
      margin: 0;
      color: #0ea5e9;
    }

    .book p {
      font-size: 13px;
      color: #64748b;
    }

    .book a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #0ea5e9;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
    }

    /* FOOTER */
    .footer {
      margin-top: 25px;
      text-align: center;
      font-size: 14px;
      color: #333;
      line-height: 1.8;
    }

    /* BIG LOCATION TEXT */
    .location {
      font-size: 16px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top">

    <img class="profile-img" src="phot1.jpg" alt="profile">

    <h1>Than Soe Naing</h1>

    <div class="role">
      Python & Author
    </div>

    <!-- SOCIAL -->
    <div class="social">
      <a href="https://www.facebook.com/share/1Ex6E1T45n/" target="_blank">Facebook</a>
      <a href="https://github.com/thansoenaingg" target="_blank">GitHub</a>
      <a href="https://t.me/thansoenaingg" target="_blank">Telegram</a>
    </div>

  </div>

  <!-- BOTTOM -->
  <div class="bottom">

    <div class="section-title">About Me</div>

    <div class="bio">
      A beginner developer learning coding, building projects, and growing every day.
    </div>

    <div class="section-title">Recommended Books</div>

    <div class="book">
      <img src="2.jpg" style="width:100%;border-radius:8px;">
      <h3>A Kyi Taw</h3>
      <p>It’s a very good book. You should try reading it.</p>
      <a href="phot.pdf" download>Download</a>
    </div>

    <!-- FOOTER -->
    <div class="footer">

      <div class="location">
        Live in Ye U, Sagaing, Myanmar
      </div>

      <br>

      📧 thansoenaing9999@gmail.com

    </div>

  </div>

</div>

</body>
</html>
